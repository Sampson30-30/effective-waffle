services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: asana
      POSTGRES_PASSWORD: asana_secret
      POSTGRES_DB: asana_tool
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://asana:asana_secret@db:5432/asana_tool
    ports:
      - '4000:4000'
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
